name: Build CycleCare APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get

      - name: Analyze code
        working-directory: cyclecare_flutter
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Debug APK
        working-directory: cyclecare_flutter
        run: flutter build apk --debug --dart-define=AI_API_KEY="${{ secrets.AI_API_KEY }}"

      - name: Build Release APK
        working-directory: cyclecare_flutter
        run: flutter build apk --release --dart-define=AI_API_KEY="${{ secrets.AI_API_KEY }}"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cyclecare-debug-apk
          path: cyclecare_flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: cyclecare-release-apk
          path: cyclecare_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
