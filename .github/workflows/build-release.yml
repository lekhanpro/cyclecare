name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Signed Release APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/cyclecare-release.jks

      - name: Create key.properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            '${{ secrets.KEYSTORE_PASSWORD }}' \
            '${{ secrets.KEY_PASSWORD }}' \
            '${{ secrets.KEY_ALIAS }}' \
            'cyclecare-release.jks' > android/key.properties

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Patch app_links compileSdk (CI fix)
        run: |
          APP_LINKS=$(find $HOME/.pub-cache -name "build.gradle" -path "*/app_links*" 2>/dev/null | head -1)
          if [ -n "$APP_LINKS" ]; then
            echo "Patching: $APP_LINKS"
            sed -i 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 35/g' "$APP_LINKS"
            echo "Patched successfully"
          else
            echo "app_links build.gradle not found, skipping patch"
          fi

      - name: Run tests
        run: flutter test --no-pub

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        run: flutter build apk --release --no-pub

      - name: Build release AAB
        run: flutter build appbundle --release --no-pub

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "CycleCare ${{ steps.tag.outputs.TAG }}"
          body: |
            ## CycleCare ${{ steps.tag.outputs.TAG }}

            ### 📥 Download
            | File | Description |
            |------|-------------|
            | `app-release.apk` | Direct install on Android |
            | `app-release.aab` | Play Store bundle |

            ### ✨ What's new
            - Complete Flutter rebuild from Kotlin
            - Material 3 design with 8 pastel palettes
            - Cycle tracking with AI-powered prediction engine
            - Daily health logging (flow, mood, symptoms, BBT, sleep, water, weight)
            - Virtual pet companion with XP & achievements
            - Firebase Auth + FCM push notifications
            - Offline-first with optional Supabase cloud sync
            - Birth control tracker, pregnancy mode, partner sharing
            - AI chat via Groq (server-side only, key never in client)

            ### 📱 Install APK
            1. Download `app-release.apk` below
            2. On your Android phone: Settings → Security → Allow unknown sources
            3. Open the downloaded APK to install

            > **Minimum Android:** 6.0 (API 23)
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

