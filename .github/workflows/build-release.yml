name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'

jobs:
  build-release:
    name: Build Signed Release APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/cyclecare-release.jks
          ls -la android/app/cyclecare-release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << 'KEYEOF'
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=cyclecare-release.jks
          KEYEOF

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --no-pub

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        run: flutter build apk --release --no-pub

      - name: Build release AAB
        run: flutter build appbundle --release --no-pub

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "CycleCare ${{ steps.tag.outputs.TAG }}"
          body: |
            ## CycleCare ${{ steps.tag.outputs.TAG }}

            ### Download
            - **APK** (direct install): `app-release.apk`
            - **AAB** (Play Store): `app-release.aab`

            ### What's in this release
            - Complete Flutter rebuild from scratch
            - Material 3 design with 8 pastel palettes
            - Cycle tracking with AI-powered prediction
            - Daily health logging (flow, mood, symptoms, BBT, sleep, water, weight)
            - Virtual pet companion with XP & achievements
            - Firebase Auth + FCM push notifications
            - Offline-first with Supabase cloud sync
            - Birth control tracker, pregnancy mode, partner sharing
            - AI chat via Groq (server-side only)

            ### Install APK on Android
            1. Download `app-release.apk`
            2. Enable "Install from unknown sources" in Android settings
            3. Open the APK file to install

            > Minimum Android version: 6.0 (API 23)
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
