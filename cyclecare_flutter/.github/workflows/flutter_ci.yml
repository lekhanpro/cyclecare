name: Flutter CI

on:
  push:
    branches: [main, flutter-full-implementation]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Analyze
        working-directory: cyclecare_flutter
        run: flutter analyze --no-fatal-infos

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Run tests
        working-directory: cyclecare_flutter
        run: flutter test

  build-android:
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Build APK
        working-directory: cyclecare_flutter
        run: flutter build apk --release

  build-web:
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Build Web
        working-directory: cyclecare_flutter
        run: flutter build web

  build-ios:
    runs-on: macos-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Build iOS (no codesign)
        working-directory: cyclecare_flutter
        run: flutter build ios --release --no-codesign
