name: Flutter CI

on:
  push:
    branches: [main, flutter-full-implementation]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.19.0'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Analyze
        working-directory: cyclecare_flutter
        run: flutter analyze --no-fatal-infos

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Run tests
        working-directory: cyclecare_flutter
        run: flutter test

  build-android-debug:
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Build Debug APK
        working-directory: cyclecare_flutter
        run: flutter build apk --debug
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: cyclecare_flutter/build/app/outputs/flutter-apk/app-debug.apk

  build-android-release:
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Build Release APK
        working-directory: cyclecare_flutter
        run: flutter build apk --release
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: cyclecare_flutter/build/app/outputs/flutter-apk/app-release.apk

  build-web:
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Build Web
        working-directory: cyclecare_flutter
        run: flutter build web
      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: cyclecare_flutter/build/web

  build-ios:
    runs-on: macos-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Build iOS (no codesign)
        working-directory: cyclecare_flutter
        run: flutter build ios --release --no-codesign
