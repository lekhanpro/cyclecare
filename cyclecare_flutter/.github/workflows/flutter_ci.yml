name: Flutter CI

on:
  push:
    branches: [main, flutter-full-implementation]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.32.8'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_TARGET_SDK: '35'
  ANDROID_NDK_VERSION: '28.2.13676358'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Analyze
        working-directory: cyclecare_flutter
        run: flutter analyze --no-fatal-infos

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Run tests
        working-directory: cyclecare_flutter
        run: flutter test

  build-android-debug:
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install \
            "platforms;android-${{ env.ANDROID_COMPILE_SDK }}" \
            "platforms;android-${{ env.ANDROID_TARGET_SDK }}" \
            "ndk;${{ env.ANDROID_NDK_VERSION }}"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Build Debug APK
        working-directory: cyclecare_flutter
        run: flutter build apk --debug --android-skip-build-dependency-validation
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: cyclecare_flutter/build/app/outputs/flutter-apk/app-debug.apk

  build-android-release:
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install \
            "platforms;android-${{ env.ANDROID_COMPILE_SDK }}" \
            "platforms;android-${{ env.ANDROID_TARGET_SDK }}" \
            "ndk;${{ env.ANDROID_NDK_VERSION }}"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Build Release APK
        working-directory: cyclecare_flutter
        run: flutter build apk --release --android-skip-build-dependency-validation
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: cyclecare_flutter/build/app/outputs/flutter-apk/app-release.apk

  build-web:
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Build Web
        working-directory: cyclecare_flutter
        run: flutter build web --release
      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: cyclecare_flutter/build/web

  build-ios:
    runs-on: macos-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        working-directory: cyclecare_flutter
        run: flutter pub get
      - name: Build iOS (no codesign)
        working-directory: cyclecare_flutter
        run: flutter build ios --release --no-codesign
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: cyclecare_flutter/build/ios
