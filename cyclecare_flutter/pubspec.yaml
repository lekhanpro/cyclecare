name: cyclecare_flutter
description: CycleCare, a privacy-first menstrual cycle tracker for iOS and Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # Local storage
  shared_preferences: ^2.2.2

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  table_calendar: ^3.1.2
  fl_chart: ^0.69.0

  # Firebase & Auth
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.0

  # Utilities
  http: ^1.2.0
  intl: ^0.19.0
  uuid: ^4.5.1
  crypto: ^3.0.6
  path_provider: ^2.1.2
  share_plus: ^10.1.4
  url_launcher: ^6.2.4

  # Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.3

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/education/
