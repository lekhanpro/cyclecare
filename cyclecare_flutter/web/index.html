<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CycleCare - Privacy-first menstrual cycle tracking">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CycleCare">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>CycleCare</title>
  <link rel="manifest" href="manifest.json">
  <script>
    var serviceWorkerVersion = null;
    var scriptLoaded = false;
    function loadMainDartJs() {
      if (scriptLoaded) return;
      scriptLoaded = true;
      var scriptTag = document.createElement('script');
      scriptTag.src = 'main.dart.js';
      scriptTag.type = 'application/javascript';
      document.body.append(scriptTag);
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        var serviceWorkerUrl = 'flutter_service_worker.js?v=' + serviceWorkerVersion;
        navigator.serviceWorker.register(serviceWorkerUrl).then(function(reg) {
          function waitForActivation(serviceWorker) {
            serviceWorker.addEventListener('statechange', function() {
              if (serviceWorker.state == 'activated') loadMainDartJs();
            });
          }
          if (!reg.active && (reg.installing || reg.waiting)) {
            waitForActivation(reg.installing ?? reg.waiting);
          } else if (!reg.active.scriptURL.endsWith(serviceWorkerVersion)) {
            reg.update();
            waitForActivation(reg.installing);
          } else {
            loadMainDartJs();
          }
        });
        setTimeout(loadMainDartJs, 4000);
      });
    } else {
      loadMainDartJs();
    }
  </script>
</head>
<body>
  <style>
    body { background-color: #fce4ec; }
    .loading { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
    .loading h1 { color: #e91e63; font-family: sans-serif; }
    .loading p { color: #666; font-family: sans-serif; }
  </style>
  <div class="loading">
    <h1>CycleCare</h1>
    <p>Loading...</p>
  </div>
</body>
</html>
